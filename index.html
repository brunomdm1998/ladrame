<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f5f9;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
  font-size:26px;
  font-weight:bold;
  color:#ff6b00;
  text-align:center;
}

.input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff6b00;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.mode-switch{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.mode-btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.active{
  background:#ff6b00;
  color:white;
}

.inactive{
  background:#eee;
}

.map{
  height:250px;
  background:#ddd;
  border-radius:15px;
  margin-top:15px;
  display:flex;
  align-items:center;
  justify-content:center;
}

</style>

</head>
<body>

<div class="container">

<div id="loginScreen" class="card">
<div class="title">🐶 LADRAME</div>

<input id="email" class="input" placeholder="Correo">
<input id="password" class="input" type="password" placeholder="Contraseña">

<button class="button" onclick="login()">Entrar</button>
</div>

<div id="homeScreen" class="card" style="display:none;">
<div class="title">🐶 LADRAME</div>

<div id="userInfo"></div>

<div id="modeSwitch" class="mode-switch"></div>

<div id="content"></div>

<button class="button" onclick="logout()">Cerrar sesión</button>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let userData = null;
let currentMode = "owner";

init();

async function init(){

  const { data:{ session } } = await supabase.auth.getSession();

  if(session){
    loadUser(session.user.id);
  }
}

async function login(){

  const { data, error } = await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){
    alert(error.message);
    return;
  }

  loadUser(data.user.id);
}

async function loadUser(userId){

  const { data } = await supabase
  .from("users")
  .select("*")
  .eq("id", userId)
  .single();

  userData = data;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("homeScreen").style.display = "block";

  renderUser();
  renderModes();
  renderContent();
}

function renderUser(){
  document.getElementById("userInfo").innerHTML = `
    <p><b>${userData.email}</b></p>
  `;
}

function renderModes(){

  let html = "";

  if(userData.owner_enabled){
    html += `<button class="mode-btn ${currentMode==="owner"?"active":"inactive"}"
    onclick="changeMode('owner')">Dueño</button>`;
  }

  if(userData.walker_enabled){
    html += `<button class="mode-btn ${currentMode==="walker"?"active":"inactive"}"
    onclick="changeMode('walker')">Paseador</button>`;
  }

  document.getElementById("modeSwitch").innerHTML = html;
}

function changeMode(mode){
  currentMode = mode;
  renderModes();
  renderContent();
}

function renderContent(){

  if(currentMode==="owner"){
    document.getElementById("content").innerHTML = `
      <h3>Modo Dueño</h3>
      <div class="map">Mapa dueño</div>
      <button class="button">Pedir paseo</button>
    `;
  } else {
    document.getElementById("content").innerHTML = `
      <h3>Modo Paseador</h3>
      <div class="map">Mapa paseador</div>
      <button class="button">Ver solicitudes</button>
    `;
  }
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
