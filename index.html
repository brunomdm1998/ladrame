<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --orange:#ff6b00;
    --orange2:#ff944d;
    --bg:#f3f5f9;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#6b7280;
    --line:#e5e7eb;
    --green:#16a34a;
    --yellow:#eab308;
    --red:#dc2626;
    --blue:#2563eb;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:linear-gradient(180deg,#fff7f1 0%,#f3f5f9 100%);
    color:var(--text);
  }
  .container{
    max-width:430px;
    margin:auto;
    padding:20px;
    min-height:100vh;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:24px;
    padding:20px;
    box-shadow:0 14px 36px rgba(0,0,0,.08);
  }
  .hidden{display:none}
  .title{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:28px;
    font-weight:900;
    color:var(--orange);
    margin-bottom:14px;
  }
  .logo{
    width:46px;height:46px;border-radius:12px;
    background:linear-gradient(135deg,var(--orange),var(--orange2));
    color:#fff;display:grid;place-items:center;font-size:24px;
  }
  .msg{
    background:#eef5ff;color:#2859b3;border-radius:12px;
    padding:12px;margin-bottom:12px;white-space:pre-wrap;
    font-size:14px;font-weight:700;
  }
  .input,.select,.textarea{
    width:100%;padding:13px;border-radius:12px;border:1px solid #ccc;
    margin-top:10px;box-sizing:border-box;font-size:14px;background:#fff;
  }
  .textarea{min-height:90px;resize:vertical}
  .button{
    width:100%;padding:14px;border:none;border-radius:14px;
    background:linear-gradient(135deg,var(--orange),var(--orange2));
    color:#fff;font-weight:900;margin-top:12px;cursor:pointer;
  }
  .button:disabled{opacity:.65;cursor:not-allowed}
  .button.gray{background:#e5e7eb;color:#111}
  .button.secondary{background:#fff;color:#ff6b00;border:2px solid #ff6b00}
  .mode-switch{display:flex;gap:10px;margin-top:12px;margin-bottom:14px}
  .mode-btn{
    flex:1;padding:11px;border:none;border-radius:12px;font-weight:900;cursor:pointer
  }
  .active{background:#ff6b00;color:#fff}
  .inactive{background:#eee;color:#111}
  .map{
    height:180px;background:#ddd;border-radius:16px;margin-top:14px;
    display:flex;align-items:center;justify-content:center;
    font-weight:900;color:#374151;
  }
  .section{margin-top:18px;padding-top:16px;border-top:1px solid #eee}
  .section h3{margin:0 0 10px;font-size:20px}
  .item{
    border:1px solid var(--line);border-radius:14px;padding:12px;
    margin-top:10px;background:#fff;
  }
  .item.highlight{
    border:2px solid var(--blue);
    box-shadow:0 0 0 4px rgba(37,99,235,.08);
    background:#f8fbff;
  }
  .small{font-size:13px;color:#666;line-height:1.45}
  .badge{
    display:inline-block;padding:5px 10px;border-radius:999px;
    font-size:12px;font-weight:900;margin-top:8px;
  }
  .green{background:var(--green);color:#fff}
  .yellow{background:var(--yellow);color:#111}
  .red{background:var(--red);color:#fff}
  .blue{background:var(--blue);color:#fff}
  .checks{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px;font-size:14px}
  .checks label{display:flex;gap:8px;align-items:flex-start}
  .pill{
    display:inline-block;padding:4px 8px;border-radius:999px;
    font-size:12px;font-weight:900;background:#f3f4f6;color:#111;margin-top:8px;
  }
  .top-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
</style>
</head>
<body>
<div class="container">

  <div id="loginScreen" class="card">
    <div class="title"><div class="logo">🐶</div><div>LADRAME</div></div>
    <div id="loginMsg" class="msg">Ingresa con tu cuenta</div>
    <input id="email" class="input" placeholder="Correo">
    <input id="password" class="input" type="password" placeholder="Contraseña">
    <button id="btnLogin" class="button" type="button">Entrar</button>
  </div>

  <div id="homeScreen" class="card hidden">
    <div class="title"><div class="logo">🐶</div><div>LADRAME</div></div>
    <div id="homeMsg" class="msg">Sesión iniciada.</div>
    <div id="userInfo"></div>
    <div id="modeSwitch" class="mode-switch"></div>
    <div id="content"></div>
    <button id="btnLogout" class="button gray" type="button">Cerrar sesión</button>
  </div>

</div>

<script>
(() => {
  const supabaseClient = window.supabase.createClient(
    "https://dnxiaronekfbbwqzslon.supabase.co",
    "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
  );

  let userData = null;
  let currentMode = "owner";
  let ownerDogs = [];
  let ownerRequests = [];
  let ownerOffers = [];
  let walkerOpenRequests = [];
  let walkerMyOffers = [];
  let refreshTimer = null;

  const $ = (id) => document.getElementById(id);

  function setLoginMsg(text){ $("loginMsg").textContent = text; }
  function setHomeMsg(text){ $("homeMsg").textContent = text; }

  function showLogin(){
    $("loginScreen").classList.remove("hidden");
    $("homeScreen").classList.add("hidden");
  }

  function showHome(){
    $("loginScreen").classList.add("hidden");
    $("homeScreen").classList.remove("hidden");
  }

  function difficultyClass(color){
    if(color === "rojo") return "red";
    if(color === "amarillo") return "yellow";
    return "green";
  }

  function formatRemaining(expiresAt){
    if(!expiresAt) return "sin tiempo";
    const diff = new Date(expiresAt).getTime() - Date.now();
    if(diff <= 0) return "vencida";
    const mins = Math.floor(diff / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    return `${mins}m ${secs}s`;
  }

  function getActiveOwnerRequest(){
    const now = Date.now();
    return ownerRequests.find(r =>
      r.status === "open" &&
      r.expires_at &&
      new Date(r.expires_at).getTime() > now
    ) || null;
  }

  async function markExpiredRequests(){
    const nowIso = new Date().toISOString();

    const { data: expiredOpen } = await supabaseClient
      .from("walk_requests")
      .select("id")
      .eq("status", "open")
      .lt("expires_at", nowIso);

    if(expiredOpen && expiredOpen.length){
      const ids = expiredOpen.map(x => x.id);

      await supabaseClient
        .from("walk_requests")
        .update({ status: "expired" })
        .in("id", ids);

      await supabaseClient
        .from("walk_offers")
        .update({ status: "expired" })
        .in("request_id", ids)
        .eq("status", "pending");
    }
  }

  async function init(){
    const { data:{ session } } = await supabaseClient.auth.getSession();
    if(session?.user){
      await loadUser(session.user.id, true);
    }else{
      showLogin();
    }
  }

  async function login(){
    const email = $("email").value.trim().toLowerCase();
    const password = $("password").value;

    if(!email || !password){
      setLoginMsg("Completa correo y contraseña.");
      return;
    }

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

    if(error){
      setLoginMsg("Error al entrar: " + error.message);
      return;
    }

    await loadUser(data.user.id, false);
  }

  async function loadUser(userId, restored){
    const { data, error } = await supabaseClient
      .from("users")
      .select("*")
      .eq("id", userId)
      .single();

    if(error){
      setLoginMsg("No se pudo cargar el perfil: " + error.message);
      showLogin();
      return;
    }

    userData = data;
    currentMode = (!userData.owner_enabled && userData.walker_enabled) ? "walker" : "owner";

    await refreshAll();

    renderUser();
    renderModes();
    renderContent();
    setHomeMsg(restored ? "Sesión restaurada." : "Sesión iniciada.");
    showHome();

    if(refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(async () => {
      if(!userData) return;
      await refreshAll();
      renderContent();
    }, 4000);
  }

  async function refreshAll(){
    if(!userData) return;
    await markExpiredRequests();
    await Promise.all([
      loadDogs(),
      loadOwnerRequests(),
      loadOwnerOffers(),
      loadWalkerOpenRequests(),
      loadWalkerMyOffers()
    ]);
  }

  async function loadDogs(){
    const { data } = await supabaseClient
      .from("dogs")
      .select("*")
      .eq("owner_id", userData.id)
      .order("created_at", { ascending: false });

    ownerDogs = data || [];
  }

  async function loadOwnerRequests(){
    const { data } = await supabaseClient
      .from("walk_requests")
      .select("*")
      .eq("owner_id", userData.id)
      .order("created_at", { ascending: false });

    ownerRequests = data || [];
  }

  async function loadOwnerOffers(){
    const { data } = await supabaseClient
      .from("walk_offers")
      .select("*")
      .eq("owner_id", userData.id)
      .order("created_at", { ascending: false });

    ownerOffers = data || [];
  }

  async function loadWalkerOpenRequests(){
    const nowIso = new Date().toISOString();

    const { data } = await supabaseClient
      .from("walk_requests")
      .select("*")
      .eq("status", "open")
      .gt("expires_at", nowIso)
      .neq("owner_id", userData.id)
      .order("created_at", { ascending: false });

    walkerOpenRequests = data || [];
  }

  async function loadWalkerMyOffers(){
    const { data } = await supabaseClient
      .from("walk_offers")
      .select("*")
      .eq("walker_id", userData.id)
      .order("created_at", { ascending: false });

    walkerMyOffers = data || [];
  }

  function renderUser(){
    $("userInfo").innerHTML = `
      <p><b>${userData.name || "Usuario"}</b></p>
      <p>${userData.email}</p>
      <p>DNI: ${userData.dni || "-"}</p>
    `;
  }

  function renderModes(){
    let html = "";

    if(userData.owner_enabled){
      html += `<button class="mode-btn ${currentMode==="owner"?"active":"inactive"}" onclick="window.__changeMode('owner')">Dueño</button>`;
    }

    if(userData.walker_enabled){
      html += `<button class="mode-btn ${currentMode==="walker"?"active":"inactive"}" onclick="window.__changeMode('walker')">Paseador</button>`;
    }

    $("modeSwitch").innerHTML = html;
  }

  function renderDogsList(){
    if(!ownerDogs.length){
      return `<div class="item">Todavía no has registrado perros.</div>`;
    }

    return ownerDogs.map(dog => `
      <div class="item">
        <b>${dog.name}</b><br>
        <span class="badge ${difficultyClass(dog.dificultad)}">${(dog.dificultad || "verde").toUpperCase()}</span>
        <div class="small" style="margin-top:8px;">
          Tamaño: ${dog.size || "-"}<br>
          Energía: ${dog.energy || "-"}<br>
          Controlable: ${dog.controllable ? "Sí" : "No"}<br>
          Sociable: ${dog.sociable ? "Sí" : "No"}<br>
          Agresivo: ${dog.agresivo ? "Sí" : "No"}<br>
          Responde a su nombre: ${dog.responds_to_name ? "Sí" : "No"}<br>
          Tira de la correa: ${dog.tira_correa ? "Sí" : "No"}<br>
          Se asusta fácil: ${dog.se_asusta ? "Sí" : "No"}<br>
          Se asusta con perros: ${dog.asusta_perros ? "Sí" : "No"}<br>
          Recomendaciones: ${dog.notes || "-"}
        </div>
      </div>
    `).join("");
  }

  function renderOwnerRequestsList(){
    if(!ownerRequests.length){
      return `<div class="item">No tienes solicitudes aún.</div>`;
    }

    return ownerRequests.map(req => `
      <div class="item">
        <b>Solicitud</b><br>
        Tarifa máxima: S/${req.tariff || 0}<br>
        Tiempo: ${req.time || 0} min<br>
        Estado: ${req.status || "-"}<br>
        Ubicación: ${req.location || "-"}<br>
        Expira en: ${formatRemaining(req.expires_at)}<br>
        <div class="small" style="margin-top:8px;">${req.comments || "-"}</div>
      </div>
    `).join("");
  }

  function renderOwnerOffersList(){
    if(!ownerOffers.length){
      return `<div class="item">No has recibido ofertas aún.</div>`;
    }

    return ownerOffers.map(offer => `
      <div class="item">
        <b>Oferta recibida</b><br>
        Precio: S/${offer.price}<br>
        Estado: ${offer.status}<br>
        ${offer.status === "pending" ? `<button class="button" onclick="window.__acceptOffer('${offer.id}')">Aceptar oferta</button>` : ""}
      </div>
    `).join("");
  }

  function renderWalkerRequestsList(){
    if(!walkerOpenRequests.length){
      return `<div class="item">No hay solicitudes abiertas por ahora.</div>`;
    }

    return walkerOpenRequests.map((req, index) => `
      <div class="item ${index === 0 ? "highlight" : ""}">
        <b>${index === 0 ? "Nueva solicitud" : "Solicitud disponible"}</b><br>
        <span class="badge blue">Tarifa del dueño: S/${req.tariff || 0}</span><br>
        Tiempo: ${req.time || 0} min<br>
        Ubicación: ${req.location || "-"}<br>
        Expira en: ${formatRemaining(req.expires_at)}<br>
        <div class="small" style="margin-top:8px;">${req.comments || "-"}</div>

        <input id="offerPrice_${req.id}" class="input" type="number" placeholder="Tu oferta en soles">
        <button class="button" onclick="window.__sendOffer('${req.id}', '${req.owner_id}')">Enviar oferta</button>
      </div>
    `).join("");
  }

  function renderWalkerOffersList(){
    if(!walkerMyOffers.length){
      return `<div class="item">No has enviado ofertas aún.</div>`;
    }

    return walkerMyOffers.map(offer => `
      <div class="item">
        <b>Mi oferta</b><br>
        Precio: S/${offer.price}<br>
        Estado: ${offer.status}
      </div>
    `).join("");
  }

  function calculateDifficulty(){
    const size = $("dogSize")?.value || "";
    const energy = $("dogEnergy")?.value || "";
    const controllable = $("dogControllable")?.checked || false;
    const sociable = $("dogSociable")?.checked || false;
    const agresivo = $("dogAgresivo")?.checked || false;
    const responds = $("dogResponds")?.checked || false;
    const leash = $("dogLeash")?.checked || false;
    const scared = $("dogScared")?.checked || false;
    const scaredDogs = $("dogScaredDogs")?.checked || false;

    if(
      agresivo ||
      !controllable ||
      (size === "grande" && leash) ||
      (energy === "hiperactivo" && !responds) ||
      (scared && !sociable)
    ) return "rojo";

    if(
      leash ||
      scared ||
      scaredDogs ||
      energy === "nervioso" ||
      energy === "hiperactivo" ||
      size === "grande"
    ) return "amarillo";

    return "verde";
  }

  function updateDifficultyPreview(){
    const box = $("dogDifficultyPreview");
    if(!box) return;
    const diff = calculateDifficulty();
    const cls = difficultyClass(diff);
    box.innerHTML = `Dificultad automática: <span class="badge ${cls}" style="margin-left:8px;">${diff.toUpperCase()}</span>`;
  }

  function bindDogForm(){
    [
      "dogSize","dogEnergy","dogControllable","dogSociable",
      "dogAgresivo","dogResponds","dogLeash","dogScared","dogScaredDogs"
    ].forEach(id => {
      const el = $(id);
      if(el) el.addEventListener("change", updateDifficultyPreview);
    });

    const saveBtn = $("btnSaveDog");
    if(saveBtn) saveBtn.onclick = saveDog;
    updateDifficultyPreview();
  }

  async function saveDog(){
    const name = $("dogName").value.trim();
    const size = $("dogSize").value;
    const energy = $("dogEnergy").value;
    const notes = $("dogNotes").value.trim();
    const dificultad = calculateDifficulty();

    if(!name || !size || !energy){
      alert("Completa nombre, tamaño y energía del perro.");
      return;
    }

    const { error } = await supabaseClient.from("dogs").insert({
      owner_id: userData.id,
      name,
      size,
      energy,
      controllable: $("dogControllable").checked,
      sociable: $("dogSociable").checked,
      agresivo: $("dogAgresivo").checked,
      responds_to_name: $("dogResponds").checked,
      tira_correa: $("dogLeash").checked,
      se_asusta: $("dogScared").checked,
      asusta_perros: $("dogScaredDogs").checked,
      dificultad,
      notes
    });

    if(error){
      alert("Error guardando perro: " + error.message);
      return;
    }

    await refreshAll();
    renderContent();
    setHomeMsg("Perro guardado correctamente.");
  }

  async function createWalkRequest(){
    const activeRequest = getActiveOwnerRequest();
    if(activeRequest){
      alert("Ya tienes una solicitud abierta. Espera a que se acepte o venza.");
      return;
    }

    const dogId = $("requestDogId")?.value || "";
    const tariff = Number($("requestTariff")?.value || 0);
    const time = Number($("requestTime")?.value || 0);
    const location = $("requestLocation")?.value?.trim() || "";
    const comments = $("requestComments")?.value?.trim() || "";
    const expiresAt = new Date(Date.now() + 10 * 60 * 1000).toISOString();

    if(!dogId){
      alert("Selecciona un perro.");
      return;
    }
    if(!tariff || tariff <= 0){
      alert("Pon una tarifa máxima válida.");
      return;
    }
    if(!time || time <= 0){
      alert("Pon un tiempo válido.");
      return;
    }

    const { error } = await supabaseClient.from("walk_requests").insert({
      owner_id: userData.id,
      dog_id: dogId,
      tariff,
      time,
      location,
      comments,
      status: "open",
      expires_at: expires
