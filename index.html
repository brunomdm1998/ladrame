<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f3f5f9;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.title{
  font-size:26px;
  font-weight:bold;
  color:#ff6b00;
}

.mode-switch{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.mode-btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.active{
  background:#ff6b00;
  color:white;
}

.inactive{
  background:#eee;
}

.button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff6b00;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

.map{
  height:250px;
  background:#ddd;
  border-radius:15px;
  margin-top:15px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="card">
<div class="title">🐶 LADRAME</div>

<div id="userInfo"></div>

<div id="modeSwitch" class="mode-switch"></div>

<div id="content"></div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let currentMode = "owner";
let userData = null;

init();

async function init(){

  const { data:{ session } } = await supabase.auth.getSession();

  if(!session){
    document.body.innerHTML = "<h2 style='text-align:center'>No hay sesión</h2>";
    return;
  }

  const user = session.user;

  const { data } = await supabase
  .from("users")
  .select("*")
  .eq("id", user.id)
  .single();

  userData = data;

  renderUser();
  renderModes();
  renderContent();
}

function renderUser(){
  document.getElementById("userInfo").innerHTML = `
    <p><b>${userData.email}</b></p>
    <p>Créditos: ${userData.balance || 0}</p>
  `;
}

function renderModes(){

  let html = "";

  if(userData.owner_enabled){
    html += `<button class="mode-btn ${currentMode==="owner"?"active":"inactive"}"
    onclick="changeMode('owner')">Dueño</button>`;
  }

  if(userData.walker_enabled){
    html += `<button class="mode-btn ${currentMode==="walker"?"active":"inactive"}"
    onclick="changeMode('walker')">Paseador</button>`;
  }

  document.getElementById("modeSwitch").innerHTML = html;
}

function changeMode(mode){
  currentMode = mode;
  renderModes();
  renderContent();
}

function renderContent(){

  if(currentMode==="owner"){
    renderOwner();
  } else {
    renderWalker();
  }
}

function renderOwner(){
  document.getElementById("content").innerHTML = `
    <h3>Modo Dueño</h3>

    <div class="map">Mapa (dueño)</div>

    <button class="button">Pedir paseo</button>
    <button class="button">Buscar hotel</button>
    <button class="button">Mis solicitudes</button>
  `;
}

function renderWalker(){
  document.getElementById("content").innerHTML = `
    <h3>Modo Paseador</h3>

    <div class="map">Mapa (paseador)</div>

    <button class="button">Ver solicitudes cercanas</button>
    <button class="button">Mis ofertas</button>
    <button class="button">Mis ganancias</button>
  `;
}
</script>

</body>
</html>
