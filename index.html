<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f3f5f9}
.container{max-width:420px;margin:auto;padding:20px;min-height:100vh;display:flex;align-items:center}
.card{background:#fff;border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.08);width:100%}
.title{font-size:28px;font-weight:900;color:#ff6b00;display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo{width:46px;height:46px;border-radius:12px;background:#ff6b00;color:#fff;display:grid;place-items:center}
.input{width:100%;padding:14px;border-radius:12px;border:1px solid #ccc;margin-top:10px}
.button{width:100%;padding:14px;border:none;border-radius:14px;background:#ff6b00;color:#fff;font-weight:900;margin-top:12px;cursor:pointer}
.button.gray{background:#e5e7eb;color:#111}
.hidden{display:none}
.mode-switch{display:flex;gap:10px;margin-top:12px}
.mode-btn{flex:1;padding:11px;border:none;border-radius:12px;font-weight:900}
.active{background:#ff6b00;color:#fff}
.inactive{background:#eee}
.map{height:220px;background:#ddd;border-radius:16px;margin-top:15px;display:flex;align-items:center;justify-content:center;font-weight:900}
.msg{padding:12px;border-radius:12px;margin-bottom:10px;background:#eef5ff}
</style>

</head>
<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen" class="card">
<div class="title"><div class="logo">🐶</div>LADRAME</div>

<div id="loginMsg" class="msg">Ingresa con tu cuenta</div>

<input id="email" class="input" placeholder="Correo">
<input id="password" class="input" type="password" placeholder="Contraseña">

<button id="btnLogin" class="button">Entrar</button>

<button class="button gray" onclick="resetPassword()">
Olvidé mi contraseña
</button>

</div>

<!-- HOME -->
<div id="homeScreen" class="card hidden">
<div class="title"><div class="logo">🐶</div>LADRAME</div>

<div id="userInfo"></div>

<div id="modeSwitch" class="mode-switch"></div>

<div id="content"></div>

<button class="button gray" onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let userData = null;
let currentMode = "owner";

init();

async function init(){
  const { data:{ session } } = await supabaseClient.auth.getSession();

  if(session){
    loadUser(session.user.id);
  }
}

document.getElementById("btnLogin").onclick = login;

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    alert("Completa correo y contraseña");
    return;
  }

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Error: " + error.message);
    return;
  }

  loadUser(data.user.id);
}

async function loadUser(id){
  const { data } = await supabaseClient
  .from("users")
  .select("*")
  .eq("id", id)
  .single();

  userData = data;

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("homeScreen").classList.remove("hidden");

  renderUser();
  renderModes();
  renderContent();
}

function renderUser(){
  userInfo.innerHTML = `
    <p><b>${userData.name || "Usuario"}</b></p>
    <p>${userData.email}</p>
  `;
}

function renderModes(){
  let html = "";

  if(userData.owner_enabled){
    html += `<button class="mode-btn ${currentMode==="owner"?"active":"inactive"}"
    onclick="changeMode('owner')">Dueño</button>`;
  }

  if(userData.walker_enabled){
    html += `<button class="mode-btn ${currentMode==="walker"?"active":"inactive"}"
    onclick="changeMode('walker')">Paseador</button>`;
  }

  modeSwitch.innerHTML = html;
}

function changeMode(mode){
  currentMode = mode;
  renderModes();
  renderContent();
}

function renderContent(){

  if(currentMode==="owner"){
    content.innerHTML = `
      <h3>Modo Dueño</h3>
      <div class="map">Mapa dueño</div>
      <button class="button">Pedir paseo</button>
    `;
  } else {
    content.innerHTML = `
      <h3>Modo Paseador</h3>
      <div class="map">Mapa paseador</div>
      <button class="button">Ver solicitudes</button>
    `;
  }

}

async function resetPassword(){
  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Escribe tu correo primero");
    return;
  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Revisa tu correo para cambiar la contraseña");
}

async function logout(){
  await supabaseClient.auth.signOut();
  location.reload();
}
</script>

</body>
</html>
