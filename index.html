<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ladrame - Paseadores de Perros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #ff6b00; }
        .bg-primary { background-color: var(--primary); }
        .text-primary { color: var(--primary); }
        .btn-primary { @apply bg-[#ff6b00] text-white font-bold py-3 px-6 rounded-2xl w-full transition-all active:scale-95; }
        .card { @apply bg-white p-6 rounded-3xl shadow-sm border border-slate-100 mb-4; }
        body { background-color: #fff7f1; font-family: system-ui, -apple-system, sans-serif; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app" class="max-w-[430px] mx-auto min-h-screen p-4">
        <!-- HEADER -->
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🐶</span>
                <h1 class="font-black text-xl tracking-tighter text-primary">LÁDRAME</h1>
            </div>
            <button id="logoutBtn" class="hidden text-slate-400 font-bold text-sm">Salir</button>
        </header>

        <!-- VISTA: LOGIN -->
        <div id="view-login" class="card mt-10">
            <h2 class="text-2xl font-black mb-2">¡Hola! 👋</h2>
            <p class="text-slate-500 mb-6 text-sm">Ingresa para pasear o pedir un paseo.</p>
            <div class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-primary">
                <input type="password" id="login-password" placeholder="Contraseña" class="w-full p-4 rounded-2xl bg-slate-50 border-none outline-primary">
                <button id="loginBtn" class="btn-primary">Entrar</button>
                <p id="login-error" class="text-red-500 text-xs text-center hidden"></p>
            </div>
        </div>

        <!-- VISTA: DASHBOARD (DUEÑO / PASEADOR) -->
        <div id="view-dashboard" class="hidden">
            <!-- Selector de Modo -->
            <div class="flex gap-2 p-1 bg-slate-200 rounded-2xl mb-6">
                <button onclick="setMode('owner')" id="tab-owner" class="flex-1 py-2 rounded-xl font-bold text-sm bg-white text-primary shadow-sm">DUEÑO</button>
                <button onclick="setMode('walker')" id="tab-walker" class="flex-1 py-2 rounded-xl font-bold text-sm text-slate-500">PASEADOR</button>
            </div>

            <!-- Contenido Dueño -->
            <div id="content-owner" class="space-y-4">
                <div class="card bg-primary text-white border-none">
                    <h3 class="font-bold mb-2">¿Necesitas un paseo?</h3>
                    <input type="number" id="request-price" placeholder="¿Cuánto ofreces? S/" class="w-full p-3 rounded-xl text-black mb-3">
                    <button onclick="createRequest()" class="w-full bg-white text-primary font-bold py-3 rounded-xl">Publicar Solicitud</button>
                </div>
                <div id="owner-requests-list"></div>
            </div>

            <!-- Contenido Paseador -->
            <div id="content-walker" class="hidden space-y-4">
                <div class="card bg-slate-800 text-white border-none flex justify-between items-center">
                    <div>
                        <p class="text-xs text-slate-400 font-bold uppercase">Tus Créditos</p>
                        <h2 id="walker-credits" class="text-3xl font-black">0</h2>
                    </div>
                    <span class="text-3xl">💰</span>
                </div>
                <div id="available-requests-list"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE (Reemplaza con tus credenciales si es necesario)
        const SUPABASE_URL = 'TU_URL_DE_SUPABASE';
        const SUPABASE_KEY = 'TU_ANON_KEY_DE_SUPABASE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentMode = 'owner';

        // --- ELEMENTOS DOM ---
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginError = document.getElementById('login-error');

        // --- AUTENTICACIÓN ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            loginBtn.innerText = "Entrando...";
            loginBtn.disabled = true;
            loginError.classList.add('hidden');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } catch (err) {
                loginError.innerText = err.message;
                loginError.classList.remove('hidden');
                loginBtn.innerText = "Entrar";
                loginBtn.disabled = false;
            }
        }

        // Escuchar cambios de sesión
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUser = session.user;
                showView('dashboard');
                loadUserData();
                initRealtime();
            } else {
                currentUser = null;
                showView('login');
            }
        });

        // --- LÓGICA DE NEGOCIO ---
        async function loadUserData() {
            if (currentMode === 'walker') {
                const { data } = await supabase.from('provider_wallets').select('balance').eq('provider_id', currentUser.id).single();
                document.getElementById('walker-credits').innerText = data?.balance || 0;
                loadAvailableRequests();
            } else {
                loadOwnerRequests();
            }
        }

        async function createRequest() {
            const price = document.getElementById('request-price').value;
            if (!price) return alert("Ingresa un precio");

            const { error } = await supabase.rpc('create_walk_request', { 
                p_price: parseFloat(price),
                p_dog_ids: [] // Aquí irían los IDs de los perros
            });

            if (error) alert(error.message);
            else {
                document.getElementById('request-price').value = '';
                loadOwnerRequests();
            }
        }

        async function loadOwnerRequests() {
            const { data } = await supabase.from('walk_requests').select('*, walk_offers(*)').eq('owner_id', currentUser.id).order('created_at', { ascending: false });
            const list = document.getElementById('owner-requests-list');
            list.innerHTML = data.map(req => `
                <div class="card">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-black text-xl text-primary">S/ ${req.price}</span>
                        <span class="text-xs font-bold uppercase px-2 py-1 bg-slate-100 rounded-lg">${req.status}</span>
                    </div>
                    ${req.walk_offers.map(off => `
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl mt-2">
                            <span class="font-bold">Oferta: S/ ${off.price}</span>
                            <button onclick="acceptOffer('${off.id}')" class="bg-primary text-white text-xs px-4 py-2 rounded-lg font-bold">Aceptar</button>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        async function loadAvailableRequests() {
            const { data } = await supabase.from('walk_requests').select('*').eq('status', 'pending').order('created_at', { ascending: false });
            const list = document.getElementById('available-requests-list');
            list.innerHTML = data.map(req => `
                <div class="card">
                    <p class="text-xs text-slate-400 font-bold">PRECIO SUGERIDO</p>
                    <h3 class="text-2xl font-black mb-4">S/ ${req.price}</h3>
                    <div class="flex gap-2">
                        <input type="number" id="offer-${req.id}" placeholder="Tu precio" class="flex-1 p-3 bg-slate-50 rounded-xl border-none">
                        <button onclick="sendOffer('${req.id}')" class="bg-slate-800 text-white px-4 rounded-xl font-bold">Ofertar</button>
                    </div>
                </div>
            `).join('');
        }

        async function sendOffer(requestId) {
            const price = document.getElementById(`offer-${requestId}`).value;
            const creditsNeeded = Math.ceil(parseFloat(price) / 10);
            
            const { error } = await supabase.rpc('send_walk_offer', { p_request_id: requestId, p_price: parseFloat(price) });
            if (error) alert(error.message);
            else alert("Oferta enviada");
        }

        async function acceptOffer(offerId) {
            const { error } = await supabase.rpc('accept_walk_offer', { p_offer_id: offerId });
            if (error) alert(error.message);
            else loadOwnerRequests();
        }

        // --- UTILIDADES ---
        function showView(view) {
            document.getElementById('view-login').classList.add('hidden');
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view === 'dashboard') logoutBtn.classList.remove('hidden');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('content-owner').classList.toggle('hidden', mode !== 'owner');
            document.getElementById('content-walker').classList.toggle('hidden', mode !== 'walker');
            document.getElementById('tab-owner').className = mode === 'owner' ? 'flex-1 py-2 rounded-xl font-bold text-sm bg-white text-primary shadow-sm' : 'flex-1 py-2 rounded-xl font-bold text-sm text-slate-500';
            document.getElementById('tab-walker').className = mode === 'walker' ? 'flex-1 py-2 rounded-xl font-bold text-sm bg-white text-primary shadow-sm' : 'flex-1 py-2 rounded-xl font-bold text-sm text-slate-500';
            loadUserData();
        }

        function initRealtime() {
            supabase.channel('changes').on('postgres_changes', { event: '*', schema: 'public' }, () => loadUserData()).subscribe();
        }

        loginBtn.addEventListener('click', handleLogin);
        logoutBtn.addEventListener('click', () => supabase.auth.signOut());

    </script>
</body>
</html>
