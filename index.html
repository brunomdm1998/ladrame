<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADRAME</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#fff8f2 0%, #fff 100%);
      overflow:hidden;
    }

    #splash{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, #ffd8b8 0%, #fff5ea 35%, #ffffff 70%);
      z-index:9999;
    }

    .wrap{
      text-align:center;
      position:relative;
      width:100%;
      max-width:900px;
      padding:20px;
    }

    .logo{
      font-size:64px;
      font-weight:900;
      letter-spacing:1px;
      margin-bottom:12px;
      color:#ff7a00;
      text-shadow:
        0 2px 0 #ffb36a,
        0 8px 18px rgba(255,122,0,.18);
    }

    .logo .me{
      color:#1f1f1f;
    }

    .subtitle{
      font-size:20px;
      color:#5f5f5f;
      margin-bottom:30px;
    }

    .scene{
      position:relative;
      width:100%;
      height:340px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .ground{
      position:absolute;
      bottom:32px;
      width:420px;
      height:18px;
      background:rgba(255,122,0,.12);
      border-radius:999px;
      filter:blur(1px);
    }

    .dog-wrap{
      position:relative;
      width:250px;
      height:250px;
      animation:bounceDog 1.1s ease-in-out infinite;
      transform-origin:center bottom;
    }

    .dog{
      position:absolute;
      inset:0;
    }

    .ear-left,
    .ear-right{
      position:absolute;
      width:48px;
      height:70px;
      background:#ff8a1d;
      top:28px;
      border:5px solid #2d2d2d;
      border-radius:28px 28px 20px 20px;
      z-index:1;
    }

    .ear-left{
      left:56px;
      transform:rotate(-20deg);
      animation:earFlapL 1.1s ease-in-out infinite;
    }

    .ear-right{
      right:56px;
      transform:rotate(20deg);
      animation:earFlapR 1.1s ease-in-out infinite;
    }

    .head{
      position:absolute;
      left:50%;
      top:40px;
      transform:translateX(-50%);
      width:150px;
      height:130px;
      background:#fff7ef;
      border:5px solid #2d2d2d;
      border-radius:50% 50% 45% 45%;
      z-index:2;
      overflow:hidden;
    }

    .patch{
      position:absolute;
      left:15px;
      top:18px;
      width:58px;
      height:62px;
      background:#ff8a1d;
      border-radius:50% 40% 45% 50%;
    }

    .eye-left,
    .eye-right{
      position:absolute;
      width:13px;
      height:18px;
      background:#2b2b2b;
      border-radius:50%;
      top:48px;
      z-index:3;
      animation:blink 4s infinite;
    }

    .eye-left{ left:44px; }
    .eye-right{ right:42px; }

    .nose{
      position:absolute;
      left:50%;
      top:68px;
      transform:translateX(-50%);
      width:24px;
      height:18px;
      background:#2b2b2b;
      border-radius:50% 50% 60% 60%;
      z-index:3;
    }

    .mouth{
      position:absolute;
      left:50%;
      top:86px;
      transform:translateX(-50%);
      width:56px;
      height:28px;
      border-bottom:5px solid #2b2b2b;
      border-radius:0 0 50px 50px;
      z-index:3;
      animation:mouthBark 1.1s ease-in-out infinite;
    }

    .tongue{
      position:absolute;
      left:50%;
      top:106px;
      transform:translateX(-50%);
      width:24px;
      height:18px;
      background:#ff6b81;
      border:4px solid #2b2b2b;
      border-top:none;
      border-radius:0 0 20px 20px;
      z-index:2;
      opacity:.9;
    }

    .body{
      position:absolute;
      left:50%;
      bottom:34px;
      transform:translateX(-50%);
      width:145px;
      height:120px;
      background:#fff7ef;
      border:5px solid #2d2d2d;
      border-radius:45% 45% 35% 35%;
      z-index:1;
    }

    .collar{
      position:absolute;
      left:50%;
      top:138px;
      transform:translateX(-50%);
      width:120px;
      height:18px;
      background:#ff7a00;
      border:4px solid #2d2d2d;
      border-radius:999px;
      z-index:3;
    }

    .tag{
      position:absolute;
      left:50%;
      top:151px;
      transform:translateX(-50%);
      width:18px;
      height:22px;
      background:#ffd15c;
      border:4px solid #2d2d2d;
      border-radius:12px;
      z-index:3;
    }

    .leg{
      position:absolute;
      bottom:4px;
      width:24px;
      height:74px;
      background:#fff7ef;
      border:5px solid #2d2d2d;
      border-top:none;
      border-radius:0 0 16px 16px;
      z-index:0;
    }

    .leg.l1{ left:70px; }
    .leg.l2{ left:102px; }
    .leg.l3{ right:102px; }
    .leg.l4{ right:70px; }

    .tail{
      position:absolute;
      right:28px;
      bottom:90px;
      width:70px;
      height:18px;
      background:#ff8a1d;
      border:5px solid #2d2d2d;
      border-left:none;
      border-radius:0 20px 20px 0;
      transform-origin:left center;
      animation:tailWag .32s ease-in-out infinite alternate;
      z-index:0;
    }

    .leash{
      position:absolute;
      left:50%;
      top:164px;
      width:190px;
      height:110px;
      border-bottom:6px solid #ff7a00;
      border-left:6px solid transparent;
      border-right:6px solid transparent;
      border-radius:0 0 140px 140px;
      transform:translateX(-20%);
      z-index:0;
      opacity:.95;
    }

    .pawprints{
      position:absolute;
      left:50%;
      bottom:4px;
      transform:translateX(-50%);
      display:flex;
      gap:18px;
      opacity:.85;
    }

    .paw{
      width:18px;
      height:18px;
      background:#ff9b3d;
      border-radius:50%;
      position:relative;
      animation:pawPulse 1.4s infinite;
    }

    .paw:nth-child(2){ animation-delay:.2s; }
    .paw:nth-child(3){ animation-delay:.4s; }

    .paw::before,
    .paw::after{
      content:"";
      position:absolute;
      background:#ff9b3d;
      border-radius:50%;
    }

    .paw::before{
      width:8px;
      height:8px;
      left:-2px;
      top:-6px;
      box-shadow:10px -2px 0 #ff9b3d, 20px 0 0 #ff9b3d;
    }

    .bark{
      position:absolute;
      right:200px;
      top:52px;
      font-size:26px;
      font-weight:900;
      color:#ff7a00;
      opacity:0;
      animation:barkText 1.1s ease-in-out infinite;
      text-shadow:0 4px 10px rgba(255,122,0,.18);
    }

    .wave{
      position:absolute;
      right:160px;
      top:66px;
      width:24px;
      height:24px;
      border:4px solid #ff9b3d;
      border-left:none;
      border-bottom:none;
      border-radius:50%;
      transform:rotate(45deg);
      opacity:0;
      animation:barkWave 1.1s ease-in-out infinite;
    }

    .wave.w2{
      right:145px;
      top:58px;
      width:38px;
      height:38px;
      animation-delay:.12s;
    }

    .loading{
      margin-top:18px;
      color:#666;
      font-size:16px;
      font-weight:700;
      letter-spacing:.4px;
    }

    .dots span{
      display:inline-block;
      animation:dots 1.2s infinite;
    }

    .dots span:nth-child(2){ animation-delay:.2s; }
    .dots span:nth-child(3){ animation-delay:.4s; }

    .skip-btn{
      margin-top:18px;
      display:inline-block;
      background:#ff7a00;
      color:#fff;
      text-decoration:none;
      padding:12px 20px;
      border-radius:14px;
      font-weight:bold;
      box-shadow:0 10px 22px rgba(255,122,0,.18);
    }

    @keyframes bounceDog{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    @keyframes tailWag{
      from{ transform:rotate(12deg); }
      to{ transform:rotate(-18deg); }
    }

    @keyframes mouthBark{
      0%,100%{ transform:translateX(-50%) scaleY(1); }
      45%,55%{ transform:translateX(-50%) scaleY(1.25); }
    }

    @keyframes barkText{
      0%,35%,100%{ opacity:0; transform:translateY(4px) scale(.95); }
      45%,70%{ opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes barkWave{
      0%,35%,100%{ opacity:0; transform:rotate(45deg) scale(.8); }
      45%,75%{ opacity:1; transform:rotate(45deg) scale(1.1); }
    }

    @keyframes pawPulse{
      0%,100%{ transform:translateY(0); opacity:.6; }
      50%{ transform:translateY(-4px); opacity:1; }
    }

    @keyframes earFlapL{
      0%,100%{ transform:rotate(-20deg); }
      50%{ transform:rotate(-28deg); }
    }

    @keyframes earFlapR{
      0%,100%{ transform:rotate(20deg); }
      50%{ transform:rotate(28deg); }
    }

    @keyframes blink{
      0%,46%,48%,100%{ transform:scaleY(1); }
      47%{ transform:scaleY(.1); }
    }

    @keyframes dots{
      0%,80%,100%{ opacity:.2; transform:translateY(0); }
      40%{ opacity:1; transform:translateY(-3px); }
    }

    @media (max-width: 640px){
      .logo{
        font-size:46px;
      }

      .subtitle{
        font-size:17px;
        padding:0 18px;
      }

      .scene{
        height:300px;
      }

      .dog-wrap{
        transform:scale(.88);
      }

      .skip-btn{
        font-size:14px;
        padding:11px 18px;
      }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="wrap">
      <div class="logo">LADRA<span class="me">ME</span></div>
      <div class="subtitle">Paseos, cuidado y hospedaje para tu perro</div>

      <div class="scene">
        <div class="ground"></div>

        <div class="bark">¡GUAU!</div>
        <div class="wave"></div>
        <div class="wave w2"></div>

        <div class="dog-wrap">
          <div class="leash"></div>

          <div class="dog">
            <div class="ear-left"></div>
            <div class="ear-right"></div>

            <div class="head">
              <div class="patch"></div>
              <div class="eye-left"></div>
              <div class="eye-right"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
              <div class="tongue"></div>
            </div>

            <div class="collar"></div>
            <div class="tag"></div>
            <div class="body"></div>

            <div class="leg l1"></div>
            <div class="leg l2"></div>
            <div class="leg l3"></div>
            <div class="leg l4"></div>

            <div class="tail"></div>
          </div>
        </div>

        <div class="pawprints">
          <div class="paw"></div>
          <div class="paw"></div>
          <div class="paw"></div>
        </div>
      </div>

      <div class="loading">
        Cargando<span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <a class="skip-btn" href="/app/">Entrar ahora</a>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/app/";
    }, 3200);
  </script>
</body>
</html>
