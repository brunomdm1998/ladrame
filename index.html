<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ff6b00" />
    
    <title>Ladrame - Tu App de Paseos de Confianza</title>
    <meta name="description" content="Conecta con los mejores paseadores de perros en tu zona de forma rápida y segura." />
    
    <!-- Fuentes de Google para un diseño premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      /* Estilos básicos para que la pantalla no se vea blanca mientras carga React */
      body {
        margin: 0;
        padding: 0;
        background-color: #fff7f1;
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      #root-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #ff6b00;
        gap: 1rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ff6b0022;
        border-top: 4px solid #ff6b00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- React reemplazará todo el contenido de este div una vez que cargue -->
    <div id="root">
      <div id="root-loader">
        <div class="spinner"></div>
        <div style="font-weight: 900; letter-spacing: -1px;">LÁDRAME</div>
      </div>
    </div>
    
    <!-- Este es el motor que arranca toda tu aplicación -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
