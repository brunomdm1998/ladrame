<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f3f5f9}
.container{max-width:430px;margin:auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:20px}
.hidden{display:none}
.button{padding:12px;border:none;border-radius:10px;background:#ff6b00;color:#fff;margin-top:10px;width:100%}
.input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
.item{border:1px solid #ddd;border-radius:10px;padding:10px;margin-top:10px}
</style>
</head>
<body>
<div class="container">

<div id="loginScreen" class="card">
<h2>LADRAME</h2>
<input id="email" class="input" placeholder="Correo">
<input id="password" class="input" type="password" placeholder="Contraseña">
<button class="button" onclick="login()">Entrar</button>
</div>

<div id="homeScreen" class="card hidden">
<h3 id="userName"></h3>
<button class="button" onclick="logout()">Cerrar sesión</button>

<div id="owner"></div>
<div id="walker"></div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://dnxiaronekfbbwqzslon.supabase.co",
"sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let user=null;
let credits=0;

async function checkSession(){
const {data:{session}} = await supabase.auth.getSession();
if(session?.user){
loadUser(session.user.id);
}
}

async function login(){
const {data,error} = await supabase.auth.signInWithPassword({
email:email.value,
password:password.value
});
if(error) return alert(error.message);
loadUser(data.user.id);
}

async function loadUser(id){
const {data} = await supabase.from("users").select("*").eq("id",id).single();
user=data;

loginScreen.classList.add("hidden");
homeScreen.classList.remove("hidden");
userName.innerText=user.name;

loadCredits();
render();
}

async function loadCredits(){
const {data} = await supabase.from("provider_wallets")
.select("*").eq("user_id",user.id).single();
credits=data?.balance||0;
}

async function render(){
await loadCredits();

const {data:reqs} = await supabase.from("walk_requests")
.select("*").order("created_at",{ascending:false});

const myReq = reqs.find(r=>r.owner_id===user.id && (r.status==="open"||r.status==="accepted"));

let ownerHTML="<h3>Dueño</h3>";

if(!myReq){
ownerHTML+=`
<input id="price" class="input" placeholder="Tarifa">
<button class="button" onclick="createReq()">Crear solicitud</button>
`;
}else{
ownerHTML+=`<div class="item">Solicitud S/${myReq.tariff}</div>`;

const {data:offers} = await supabase.from("walk_offers")
.select("*").eq("request_id",myReq.id);

offers.forEach(o=>{
ownerHTML+=`
<div class="item">
Oferta S/${o.price}
<button onclick="accept('${o.id}')">Aceptar</button>
<button onclick="reject('${o.id}')">Rechazar</button>
</div>`;
});
}

owner.innerHTML=ownerHTML;

let walkerHTML=`<h3>Paseador</h3>
<div>Créditos: ${credits}</div>
<div>Máx: S/${credits*10}</div>`;

reqs.filter(r=>r.status==="open" && r.owner_id!==user.id).forEach(r=>{
walkerHTML+=`
<div class="item">
Dueño ofrece S/${r.tariff}
<input id="of_${r.id}" class="input" placeholder="Tu oferta">
<button onclick="send('${r.id}','${r.owner_id}')">Enviar</button>
</div>`;
});

walker.innerHTML=walkerHTML;
}

async function createReq(){
const price=Number(document.getElementById("price").value);
await supabase.rpc("create_walk_request",{
p_owner_id:user.id,
p_dog_id:null,
p_tariff:price,
p_time:30,
p_location:"",
p_comments:"",
p_lat:0,
p_lng:0
});
render();
}

async function send(id,ownerId){
const price=Number(document.getElementById("of_"+id).value);

if(price>credits*10){
alert("No tienes créditos suficientes");
return;
}

await supabase.rpc("send_walk_offer",{
p_request_id:id,
p_owner_id:ownerId,
p_price:price
});
render();
}

async function accept(id){
await supabase.rpc("accept_walk_offer",{p_offer_id:id});
render();
}

async function reject(id){
await supabase.rpc("reject_walk_offer",{p_offer_id:id});
render();
}

async function logout(){
await supabase.auth.signOut();
location.reload();
}

checkSession();
</script>

</body>
</html>
