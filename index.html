<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LADRAME</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial, sans-serif;
      background:linear-gradient(180deg,#fff7ef 0%, #fffdf9 100%);
    }

    #splash{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, #ffd9b8 0%, #fff2e6 35%, #ffffff 80%);
      z-index:9999;
    }

    .wrap{
      width:100%;
      max-width:1000px;
      text-align:center;
      padding:24px;
      position:relative;
    }

    .logo{
      font-size:68px;
      font-weight:900;
      letter-spacing:1px;
      margin-bottom:10px;
      background:linear-gradient(180deg,#ffb04d 0%, #ff7a00 55%, #d85600 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:
        0 2px 0 rgba(255,255,255,.3),
        0 8px 20px rgba(255,122,0,.18);
    }

    .logo .me{
      background:linear-gradient(180deg,#333 0%, #111 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subtitle{
      color:#5f5f5f;
      font-size:20px;
      font-weight:700;
      margin-bottom:26px;
    }

    .scene{
      position:relative;
      width:100%;
      height:380px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }

    .ground{
      position:absolute;
      bottom:24px;
      width:480px;
      height:22px;
      background:rgba(255,122,0,.11);
      border-radius:999px;
      filter:blur(1px);
    }

    .dog-wrap{
      position:relative;
      width:320px;
      height:300px;
      animation:dogBounce 1.15s ease-in-out infinite;
      transform-origin:center bottom;
    }

    .dog{
      position:absolute;
      inset:0;
    }

    .body{
      position:absolute;
      left:95px;
      top:118px;
      width:150px;
      height:122px;
      background:linear-gradient(180deg,#ffffff 0%, #f4ede5 100%);
      border:6px solid #2a2a2a;
      border-radius:42% 42% 36% 36%;
      box-shadow:
        inset -8px -12px 0 rgba(0,0,0,.04),
        inset 6px 6px 0 rgba(255,255,255,.7);
      z-index:2;
    }

    .chest{
      position:absolute;
      left:128px;
      top:146px;
      width:84px;
      height:84px;
      background:linear-gradient(180deg,#fffdf9 0%, #f2ece4 100%);
      border-radius:40px 40px 30px 30px;
      z-index:3;
    }

    .head{
      position:absolute;
      left:92px;
      top:32px;
      width:156px;
      height:132px;
      background:linear-gradient(180deg,#fffdf9 0%, #f3ede5 100%);
      border:6px solid #2a2a2a;
      border-radius:44% 44% 42% 42%;
      overflow:hidden;
      z-index:5;
      box-shadow:
        inset -8px -10px 0 rgba(0,0,0,.04),
        inset 6px 6px 0 rgba(255,255,255,.8);
    }

    .patch{
      position:absolute;
      left:0;
      top:0;
      width:82px;
      height:88px;
      background:linear-gradient(180deg,#ffb04d 0%, #ff7a00 100%);
      border-radius:0 0 38px 0;
      opacity:.95;
    }

    .ear-left,
    .ear-right{
      position:absolute;
      width:48px;
      height:70px;
      background:linear-gradient(180deg,#ffb04d 0%, #ff7a00 100%);
      border:6px solid #2a2a2a;
      border-radius:22px 22px 18px 18px;
      z-index:4;
      transform-origin:center top;
    }

    .ear-left{
      left:94px;
      top:16px;
      transform:rotate(-20deg);
      animation:earFlapLeft 1.15s ease-in-out infinite;
    }

    .ear-right{
      right:94px;
      top:16px;
      transform:rotate(20deg);
      animation:earFlapRight 1.15s ease-in-out infinite;
    }

    .eye-left,
    .eye-right{
      position:absolute;
      width:14px;
      height:18px;
      background:#1f1f1f;
      border-radius:50%;
      top:48px;
      z-index:7;
      animation:blink 4s infinite;
    }

    .eye-left{ left:44px; }
    .eye-right{ right:42px; }

    .eyebrow-left,
    .eyebrow-right{
      position:absolute;
      width:18px;
      height:8px;
      border-top:4px solid #2a2a2a;
      border-radius:50%;
      top:34px;
      z-index:7;
      opacity:.65;
    }

    .eyebrow-left{ left:38px; transform:rotate(-8deg); }
    .eyebrow-right{ right:36px; transform:rotate(8deg); }

    .muzzle{
      position:absolute;
      left:50%;
      top:58px;
      transform:translateX(-50%);
      width:70px;
      height:46px;
      background:linear-gradient(180deg,#fffdfb 0%, #efe7dd 100%);
      border-radius:26px;
      z-index:6;
    }

    .nose{
      position:absolute;
      left:50%;
      top:66px;
      transform:translateX(-50%);
      width:24px;
      height:18px;
      background:#1f1f1f;
      border-radius:50% 50% 60% 60%;
      z-index:8;
    }

    .mouth{
      position:absolute;
      left:50%;
      top:84px;
      transform:translateX(-50%);
      width:54px;
      height:26px;
      border-bottom:5px solid #1f1f1f;
      border-radius:0 0 50px 50px;
      z-index:8;
      animation:mouthBark 1.15s ease-in-out infinite;
    }

    .tongue{
      position:absolute;
      left:50%;
      top:101px;
      transform:translateX(-50%);
      width:24px;
      height:18px;
      background:#ff6e86;
      border:4px solid #2a2a2a;
      border-top:none;
      border-radius:0 0 16px 16px;
      z-index:7;
    }

    .collar{
      position:absolute;
      left:110px;
      top:145px;
      width:120px;
      height:20px;
      background:linear-gradient(180deg,#ff9a2f 0%, #ff6900 100%);
      border:5px solid #2a2a2a;
      border-radius:999px;
      z-index:9;
    }

    .tag{
      position:absolute;
      left:162px;
      top:158px;
      width:18px;
      height:23px;
      background:linear-gradient(180deg,#ffd75e 0%, #ffb400 100%);
      border:4px solid #2a2a2a;
      border-radius:12px;
      z-index:10;
    }

    .leg{
      position:absolute;
      width:28px;
      height:82px;
      background:linear-gradient(180deg,#fffdf9 0%, #f0e8df 100%);
      border:6px solid #2a2a2a;
      border-top:none;
      border-radius:0 0 18px 18px;
      bottom:34px;
      z-index:1;
    }

    .leg.l1{ left:118px; }
    .leg.l2{ left:150px; }
    .leg.l3{ left:187px; }
    .leg.l4{ left:219px; }

    .paw-foot{
      position:absolute;
      bottom:-8px;
      left:-2px;
      width:32px;
      height:16px;
      background:#fff6ee;
      border:5px solid #2a2a2a;
      border-top:none;
      border-radius:0 0 18px 18px;
    }

    .tail{
      position:absolute;
      left:226px;
      top:150px;
      width:72px;
      height:18px;
      background:linear-gradient(180deg,#ffb04d 0%, #ff7a00 100%);
      border:6px solid #2a2a2a;
      border-left:none;
      border-radius:0 20px 20px 0;
      transform-origin:left center;
      animation:tailWag .28s ease-in-out infinite alternate;
      z-index:0;
    }

    .leash{
      position:absolute;
      left:177px;
      top:175px;
      width:260px;
      height:120px;
      border-bottom:7px solid #ff7a00;
      border-left:7px solid transparent;
      border-right:7px solid transparent;
      border-radius:0 0 180px 180px;
      z-index:0;
      opacity:.95;
    }

    .pawprints{
      position:absolute;
      bottom:8px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:18px;
      z-index:11;
    }

    .paw{
      width:18px;
      height:18px;
      background:#ff9b3d;
      border-radius:50%;
      position:relative;
      animation:pawPulse 1.4s infinite;
    }

    .paw:nth-child(2){ animation-delay:.2s; }
    .paw:nth-child(3){ animation-delay:.4s; }

    .paw::before{
      content:"";
      position:absolute;
      width:8px;
      height:8px;
      left:-2px;
      top:-6px;
      border-radius:50%;
      background:#ff9b3d;
      box-shadow:10px -2px 0 #ff9b3d, 20px 0 0 #ff9b3d;
    }

    .bark{
      position:absolute;
      right:180px;
      top:30px;
      font-size:28px;
      font-weight:900;
      color:#ff7a00;
      text-shadow:0 4px 12px rgba(255,122,0,.18);
      opacity:0;
      animation:barkText 1.15s ease-in-out infinite;
    }

    .wave{
      position:absolute;
      right:138px;
      top:42px;
      width:26px;
      height:26px;
      border:4px solid #ff9b3d;
      border-left:none;
      border-bottom:none;
      border-radius:50%;
      transform:rotate(45deg);
      opacity:0;
      animation:barkWave 1.15s ease-in-out infinite;
    }

    .wave.w2{
      right:122px;
      top:32px;
      width:40px;
      height:40px;
      animation-delay:.12s;
    }

    .loading{
      margin-top:18px;
      color:#666;
      font-size:16px;
      font-weight:700;
    }

    .dots span{
      display:inline-block;
      animation:dots 1.2s infinite;
    }

    .dots span:nth-child(2){ animation-delay:.2s; }
    .dots span:nth-child(3){ animation-delay:.4s; }

    .skip-btn{
      display:inline-block;
      margin-top:18px;
      background:#ff7a00;
      color:#fff;
      text-decoration:none;
      padding:12px 22px;
      border-radius:14px;
      font-weight:900;
      box-shadow:0 10px 24px rgba(255,122,0,.18);
    }

    @keyframes dogBounce{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-8px); }
    }

    @keyframes tailWag{
      from{ transform:rotate(10deg); }
      to{ transform:rotate(-18deg); }
    }

    @keyframes mouthBark{
      0%,100%{ transform:translateX(-50%) scaleY(1); }
      45%,55%{ transform:translateX(-50%) scaleY(1.28); }
    }

    @keyframes barkText{
      0%,35%,100%{ opacity:0; transform:translateY(5px) scale(.95); }
      45%,70%{ opacity:1; transform:translateY(0) scale(1); }
    }

    @keyframes barkWave{
      0%,35%,100%{ opacity:0; transform:rotate(45deg) scale(.8); }
      45%,75%{ opacity:1; transform:rotate(45deg) scale(1.1); }
    }

    @keyframes pawPulse{
      0%,100%{ transform:translateY(0); opacity:.6; }
      50%{ transform:translateY(-4px); opacity:1; }
    }

    @keyframes earFlapLeft{
      0%,100%{ transform:rotate(-20deg); }
      50%{ transform:rotate(-28deg); }
    }

    @keyframes earFlapRight{
      0%,100%{ transform:rotate(20deg); }
      50%{ transform:rotate(28deg); }
    }

    @keyframes blink{
      0%,46%,48%,100%{ transform:scaleY(1); }
      47%{ transform:scaleY(.1); }
    }

    @keyframes dots{
      0%,80%,100%{ opacity:.2; transform:translateY(0); }
      40%{ opacity:1; transform:translateY(-3px); }
    }

    @media (max-width: 700px){
      .logo{
        font-size:52px;
      }

      .subtitle{
        font-size:17px;
        padding:0 10px;
      }

      .scene{
        height:320px;
      }

      .dog-wrap{
        transform:scale(.82);
      }

      .bark{
        right:135px;
        top:35px;
        font-size:22px;
      }

      .wave{
        right:104px;
      }

      .wave.w2{
        right:90px;
      }
    }
  </style>
</head>
<body>
  <div id="splash">
    <div class="wrap">
      <div class="logo">LADRA<span class="me">ME</span></div>
      <div class="subtitle">Paseos, cuidado y hospedaje para tu perro</div>

      <div class="scene">
        <div class="ground"></div>
        <div class="bark">¡GUAU!</div>
        <div class="wave"></div>
        <div class="wave w2"></div>

        <div class="dog-wrap">
          <div class="leash"></div>

          <div class="dog">
            <div class="ear-left"></div>
            <div class="ear-right"></div>

            <div class="head">
              <div class="patch"></div>
              <div class="eyebrow-left"></div>
              <div class="eyebrow-right"></div>
              <div class="eye-left"></div>
              <div class="eye-right"></div>
              <div class="muzzle"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
              <div class="tongue"></div>
            </div>

            <div class="collar"></div>
            <div class="tag"></div>
            <div class="body"></div>
            <div class="chest"></div>

            <div class="leg l1"><div class="paw-foot"></div></div>
            <div class="leg l2"><div class="paw-foot"></div></div>
            <div class="leg l3"><div class="paw-foot"></div></div>
            <div class="leg l4"><div class="paw-foot"></div></div>

            <div class="tail"></div>
          </div>
        </div>

        <div class="pawprints">
          <div class="paw"></div>
          <div class="paw"></div>
          <div class="paw"></div>
        </div>
      </div>

      <div class="loading">
        Cargando<span class="dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <a class="skip-btn" href="/app/" id="enterNow">Entrar ahora</a>
    </div>
  </div>

  <audio id="barkSound" src="bark.mp3" preload="auto"></audio>

  <script>
    const bark = document.getElementById("barkSound");
    const enterNow = document.getElementById("enterNow");

    function tryPlayBark(){
      bark.play().catch(() => {
        console.log("El navegador bloqueó el sonido automático.");
      });
    }

    setTimeout(() => {
      tryPlayBark();
    }, 700);

    document.addEventListener("click", () => {
      bark.play().catch(() => {});
    }, { once:true });

    enterNow.addEventListener("click", () => {
      bark.play().catch(() => {});
    });

    setTimeout(() => {
      window.location.href = "/app/";
    }, 3200);
  </script>
</body>
</html>
