<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f3f5f9}
.container{max-width:430px;margin:auto;padding:20px}
.card{background:#fff;border-radius:20px;padding:20px}
.hidden{display:none}
.button{padding:12px;border:none;border-radius:10px;background:#ff6b00;color:#fff;margin-top:10px;width:100%}
.input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ccc}
.item{border:1px solid #ddd;border-radius:10px;padding:10px;margin-top:10px}
</style>
</head>

<body>
<div class="container">

<div id="loginScreen" class="card">
<h2>LADRAME</h2>
<input id="email" class="input" placeholder="Correo">
<input id="password" class="input" type="password" placeholder="Contraseña">
<button class="button" onclick="login()">Entrar</button>
</div>

<div id="homeScreen" class="card hidden">
<h3 id="userName"></h3>
<button class="button" onclick="logout()">Salir</button>

<div id="ownerSection"></div>
<div id="walkerSection"></div>

</div>

</div>

<script>
const supabase = window.supabase.createClient(
"https://dnxiaronekfbbwqzslon.supabase.co",
"sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let user = null;
let wallet = 0;

async function login(){
const {data,error} = await supabase.auth.signInWithPassword({
email:email.value,
password:password.value
});
if(error)return alert(error.message);
loadUser(data.user.id);
}

async function loadUser(id){
const {data} = await supabase.from("users").select("*").eq("id",id).single();
user = data;

document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("homeScreen").classList.remove("hidden");
document.getElementById("userName").innerText = user.name;

loadWallet();
loadOwner();
loadWalker();
}

async function loadWallet(){
const {data} = await supabase.from("provider_wallets")
.select("*")
.eq("user_id",user.id)
.single();

wallet = data?.balance || 0;
}

async function loadOwner(){
const {data:requests} = await supabase.from("walk_requests")
.select("*")
.eq("owner_id",user.id)
.order("created_at",{ascending:false});

let active = requests.find(r=>r.status=="open"||r.status=="accepted");

let html = "<h4>Dueño</h4>";

if(!active){
html+=`
<input id="priceOwner" class="input" placeholder="Tarifa">
<button class="button" onclick="createRequest()">Crear solicitud</button>
`;
}else{
html+=`<div class="item">Solicitud activa S/${active.tariff}</div>`;

const {data:offers} = await supabase.from("walk_offers")
.select("*")
.eq("request_id",active.id);

offers.forEach(o=>{
html+=`
<div class="item">
Oferta S/${o.price}
<button onclick="acceptOffer('${o.id}')">Aceptar</button>
<button onclick="rejectOffer('${o.id}')">Rechazar</button>
</div>
`;
});
}

document.getElementById("ownerSection").innerHTML = html;
}

async function loadWalker(){
const {data:reqs} = await supabase.from("walk_requests")
.select("*")
.eq("status","open");

let max = wallet*10;

let html = `<h4>Paseador</h4>
<div>Créditos: ${wallet}</div>
<div>Máximo oferta: S/${max}</div>
`;

reqs.forEach(r=>{
html+=`
<div class="item">
Dueño paga S/${r.tariff}
<input id="offer_${r.id}" class="input" placeholder="Tu oferta">
<button onclick="sendOffer('${r.id}','${r.owner_id}')">Enviar</button>
</div>
`;
});

document.getElementById("walkerSection").innerHTML = html;
}

async function createRequest(){
const price = Number(document.getElementById("priceOwner").value);
await supabase.rpc("create_walk_request",{
p_owner_id:user.id,
p_dog_id:null,
p_tariff:price,
p_time:30,
p_location:"",
p_comments:"",
p_lat:0,
p_lng:0
});
loadOwner();
}

async function sendOffer(id,owner){
const price = Number(document.getElementById("offer_"+id).value);

if(price > wallet*10){
alert("No tienes créditos suficientes");
return;
}

await supabase.rpc("send_walk_offer",{
p_request_id:id,
p_owner_id:owner,
p_price:price
});

loadWalker();
}

async function acceptOffer(id){
await supabase.rpc("accept_walk_offer",{p_offer_id:id});
loadOwner();
}

async function rejectOffer(id){
await supabase.rpc("reject_walk_offer",{p_offer_id:id});
loadOwner();
}

async function logout(){
await supabase.auth.signOut();
location.reload();
}
</script>

</body>
</html>
