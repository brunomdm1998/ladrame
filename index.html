<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f3f5f9}
.container{max-width:420px;margin:auto;padding:20px}
.card{background:white;border-radius:20px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,0.08)}
.title{font-size:26px;font-weight:bold;color:#ff6b00}
.input,select,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ccc}
.button{width:100%;padding:14px;border:none;border-radius:12px;background:#ff6b00;color:white;font-weight:bold;margin-top:10px}
.mode-switch{display:flex;gap:10px;margin-top:10px}
.mode-btn{flex:1;padding:10px;border:none;border-radius:10px;font-weight:bold}
.active{background:#ff6b00;color:white}
.inactive{background:#eee}
.map{height:200px;background:#ddd;border-radius:15px;margin-top:15px;display:flex;align-items:center;justify-content:center}
.badge{padding:5px 10px;border-radius:10px;color:white;font-size:12px;font-weight:bold}
.green{background:#16a34a}
.yellow{background:#eab308;color:black}
.red{background:#dc2626}
.hidden{display:none}
</style>
</head>

<body>
<div class="container">

<div id="loginScreen" class="card">
<div class="title">🐶 LADRAME</div>
<input id="email" class="input" placeholder="Correo">
<input id="password" class="input" type="password" placeholder="Contraseña">
<button class="button" onclick="login()">Entrar</button>
</div>

<div id="homeScreen" class="card hidden">
<div class="title">🐶 LADRAME</div>

<div id="userInfo"></div>
<div id="modeSwitch" class="mode-switch"></div>
<div id="content"></div>

<button class="button" onclick="logout()">Cerrar sesión</button>
</div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let userData = null;
let currentMode = "owner";
let dogs = [];

init();

async function init(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(session){
    loadUser(session.user.id);
  }
}

async function login(){
  const { data, error } = await supabase.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });

  if(error){
    alert(error.message);
    return;
  }

  loadUser(data.user.id);
}

async function loadUser(id){
  const { data } = await supabase.from("users").select("*").eq("id", id).single();
  userData = data;

  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("homeScreen").classList.remove("hidden");

  loadDogs();
  renderUser();
  renderModes();
  renderContent();
}

async function loadDogs(){
  const { data } = await supabase.from("dogs").select("*").eq("owner_id", userData.id);
  dogs = data || [];
}

function renderUser(){
  userInfo.innerHTML = `<p>${userData.email}</p>`;
}

function renderModes(){
  let html = "";

  if(userData.owner_enabled){
    html += `<button class="mode-btn ${currentMode==="owner"?"active":"inactive"}" onclick="changeMode('owner')">Dueño</button>`;
  }

  if(userData.walker_enabled){
    html += `<button class="mode-btn ${currentMode==="walker"?"active":"inactive"}" onclick="changeMode('walker')">Paseador</button>`;
  }

  modeSwitch.innerHTML = html;
}

function changeMode(mode){
  currentMode = mode;
  renderModes();
  renderContent();
}

function calculateDifficulty(){
  if(dogAgresivo.checked || !dogControlable.checked) return "rojo";
  if(dogCorrea.checked || dogAsusta.checked || dogAsustaPerros.checked || dogEnergy.value!=="tranquilo") return "amarillo";
  return "verde";
}

function renderContent(){
  if(currentMode==="owner"){
    content.innerHTML = `
    <h3>Modo Dueño</h3>

    <div class="map">Mapa</div>

    <button class="button">Pedir paseo</button>

    <h3>Registrar perro</h3>

    <input id="dogName" class="input" placeholder="Nombre">
    
    <select id="dogSize" class="input">
    <option value="pequeño">Pequeño</option>
    <option value="mediano">Mediano</option>
    <option value="grande">Grande</option>
    </select>

    <select id="dogEnergy" class="input">
    <option value="tranquilo">Tranquilo</option>
    <option value="nervioso">Nervioso</option>
    <option value="hiperactivo">Hiperactivo</option>
    </select>

    <label><input type="checkbox" id="dogControlable"> Controlable</label><br>
    <label><input type="checkbox" id="dogSociable"> Sociable</label><br>
    <label><input type="checkbox" id="dogAgresivo"> Agresivo</label><br>
    <label><input type="checkbox" id="dogResponde"> Responde a su nombre</label><br>
    <label><input type="checkbox" id="dogCorrea"> Tira de la correa</label><br>
    <label><input type="checkbox" id="dogAsusta"> Se asusta fácil</label><br>
    <label><input type="checkbox" id="dogAsustaPerros"> Se asusta con perros</label><br>

    <textarea id="dogNotes" placeholder="Recomendaciones"></textarea>

    <button class="button" onclick="saveDog()">Guardar perro</button>

    <h3>Mis perros</h3>
    ${dogs.map(d => `
      <div>
        <b>${d.name}</b>
        <span class="badge ${d.dificultad==='rojo'?'red':d.dificultad==='amarillo'?'yellow':'green'}">
        ${d.dificultad}
        </span>
      </div>
    `).join("")}
    `;
  } else {
    content.innerHTML = `
    <h3>Modo Paseador</h3>
    <div class="map">Mapa paseador</div>
    `;
  }
}

async function saveDog(){
  const dificultad = calculateDifficulty();

  const { error } = await supabase.from("dogs").insert({
    owner_id:userData.id,
    name:dogName.value,
    size:dogSize.value,
    energy:dogEnergy.value,
    controllable:dogControlable.checked,
    sociable:dogSociable.checked,
    agresivo:dogAgresivo.checked,
    responds_to_name:dogResponde.checked,
    tira_correa:dogCorrea.checked,
    se_asusta:dogAsusta.checked,
    asusta_perros:dogAsustaPerros.checked,
    dificultad,
    notes:dogNotes.value
  });

  if(error){
    alert(error.message);
    return;
  }

  alert("Perro guardado");
  loadDogs();
  renderContent();
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}
</script>
</body>
</html>
