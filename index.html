<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

<style>
body{
  margin:0;
  background:#111;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

#phone{
  width:360px;
  height:720px;
  background:#000;
  border-radius:25px;
  padding:20px;
}

input, button{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

button{
  background:#ff6b00;
  color:#fff;
}
</style>
</head>

<body>

<div id="phone">

<h2>LADRAME 🐕</h2>

<input id="tarifa" placeholder="Tarifa S/" />
<input id="tiempo" placeholder="Tiempo (min)" />

<button onclick="crearPaseo()">Crear paseo</button>

</div>

<script>

// 🔥 SUPABASE
const supabase = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let currentUser = null;
let currentLat = -12.0464;
let currentLng = -77.0428;

// 🔥 FIREBASE CONFIG
firebase.initializeApp({
  apiKey: "AIzaSyD9L3huvvYNiKbpC1NUwoMpY0D3XhTjqMQ",
  authDomain: "ladrame-95d90.firebaseapp.com",
  projectId: "ladrame-95d90",
  storageBucket: "ladrame-95d90.firebasestorage.app",
  messagingSenderId: "214404716079",
  appId: "1:214404716079:web:780f60acdba8b3903518da"
});

const messaging = firebase.messaging();

// 🔔 ACTIVAR PUSH
async function activarPush(){

  try{

    const permiso = await Notification.requestPermission();

    if(permiso !== "granted"){
      alert("Activa notificaciones");
      return;
    }

    const sw = await navigator.serviceWorker.register("./firebase-messaging-sw.js");

    const token = await messaging.getToken({
      vapidKey: "BEB_OnIAe6K0jKlH1cSBpfm2Quf4OywLmp7Dmm9JlCQRc77xEHTeCvKQqanEEtWzCSSMtWO1l30PuvqVQlA39dg",
      serviceWorkerRegistration: sw
    });

    console.log("TOKEN:", token);

    if(!token) return;

    await supabase.from("push_tokens").upsert({
      user_id: currentUser.id,
      token: token
    });

  }catch(err){
    console.log("Error push:", err);
  }

}

// 🔐 LOGIN
async function init(){
  const { data } = await supabase.auth.signInAnonymously();
  currentUser = data.user;

  activarPush();
}
init();


// 🚀 CREAR PASEO
async function crearPaseo(){

  const tarifa = document.getElementById("tarifa").value;
  const tiempo = document.getElementById("tiempo").value;

  if(!tarifa || !tiempo){
    alert("Completa todo");
    return;
  }

  await supabase.from("walk_requests").insert({
    user_id: currentUser.id,
    lat: currentLat,
    lng: currentLng,
    tariff: tarifa,
    time: tiempo
  });

  await fetch("https://dnxiaronekfbbwqzslon.supabase.co/functions/v1/send-push-walk", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lat: currentLat,
      lng: currentLng,
      tariff: tarifa,
      time: tiempo
    })
  });

  alert("Paseo enviado 🚀");

}


// 🔔 CUANDO LLEGA NOTIFICACIÓN
messaging.onMessage((payload)=>{
  console.log("Push recibido:", payload);

  new Notification(payload.notification.title, {
    body: payload.notification.body
  });
});

</script>

</body>
</html>
