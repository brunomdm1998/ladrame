<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ff6b00" />
    
    <title>Ladrame - Tu App de Paseos de Confianza</title>
    <meta name="description" content="Conecta con los mejores paseadores de perros en tu zona de forma rápida y segura." />
    
    <!-- Fuentes de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #fff7f1;
        font-family: 'Inter', sans-serif;
      }
      #root-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #ff6b00;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #ff6b0022;
        border-top: 4px solid #ff6b00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pantalla de carga inicial -->
      <div id="root-loader">
        <div class="spinner"></div>
        <div style="margin-top: 1rem; font-weight: 900;">LÁDRAME</div>
      </div>
    </div>
    
    <!-- IMPORTANTE: Esta línea conecta el HTML con el código de React -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
