<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:Arial; padding:20px">

<h2>Registro LADRAME</h2>

<input id="email" placeholder="Correo"><br><br>
<input id="password" placeholder="Contraseña"><br><br>

<button onclick="enviarOTP()">Enviar OTP</button><br><br>

<input id="code" placeholder="Código"><br><br>
<button onclick="verificarOTP()">Verificar</button><br><br>

<input id="name" placeholder="Nombre"><br><br>
<input id="dni" placeholder="DNI"><br><br>

<select id="role">
<option value="owner">Dueño</option>
<option value="walker">Paseador</option>
<option value="both">Ambos</option>
</select><br><br>

<video id="video" autoplay style="width:100%"></video><br>
<button onclick="abrirCamara()">Abrir cámara</button>
<button onclick="tomarFoto()">Tomar selfie / DNI</button><br><br>

<button onclick="crearCuenta()">FINALIZAR</button>

<script>
const supabase = window.supabase.createClient(
  "https://dnxiaronekfbbwqzslon.supabase.co",
  "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"
);

let selfie = "";
let dniFoto = "";

async function enviarOTP(){
  await fetch("https://dnxiaronekfbbwqzslon.supabase.co/functions/v1/send-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value})
  });
  alert("OTP enviado");
}

async function verificarOTP(){
  await fetch("https://dnxiaronekfbbwqzslon.supabase.co/functions/v1/verify-otp",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:email.value,code:code.value})
  });
  alert("Verificado");
}

async function abrirCamara(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
}

function tomarFoto(){
  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);

  const foto = canvas.toDataURL("image/jpeg");

  if(!selfie){
    selfie = foto;
    alert("Selfie tomada");
  } else {
    dniFoto = foto;
    alert("DNI tomado");
  }
}

async function crearCuenta(){

  if(!selfie || !dniFoto){
    alert("Falta selfie o DNI");
    return;
  }

  await fetch("https://dnxiaronekfbbwqzslon.supabase.co/functions/v1/create-account-full",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value,
      name:name.value,
      dni:dni.value,
      role_mode:role.value,
      selfie_base64:selfie,
      dni_base64:dniFoto
    })
  });

  alert("CUENTA CREADA 🔥");
}
</script>

</body>
</html>
