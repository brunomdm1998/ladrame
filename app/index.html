<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST OTP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Registro</h2>

<input id="email" placeholder="Correo">
<button id="btn">Enviar código</button>

<script>
const SUPABASE_URL = "https://dnxiaronekfbbwqzslon.supabase.co"
const SUPABASE_KEY = "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"

document.getElementById("btn").addEventListener("click", async () => {

  const email = document.getElementById("email").value

  console.log("CLICK detectado")

  try{
    const res = await fetch(`${SUPABASE_URL}/functions/v1/send-otp`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify({ email })
    })

    const data = await res.json()
    console.log("RESPUESTA:", data)

    alert("Si ves esto, el botón YA funciona")

  }catch(e){
    console.error(e)
    alert("Error: " + e.message)
  }

})
</script>

</body>
</html>
