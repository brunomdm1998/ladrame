<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LADRAME OTP FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:0;background:#f2f4f7}
.container{max-width:420px;margin:auto;padding:20px}
.card{background:white;padding:20px;border-radius:20px;margin-bottom:15px}
input,select,button{
width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ccc
}
button{background:#ff6b00;color:white;font-weight:bold;border:none}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<!-- EMAIL -->
<div class="card" id="emailScreen">
<h3>Registro</h3>
<input id="email" placeholder="Correo">
<button onclick="enviarCodigo()">Enviar código</button>
</div>

<!-- OTP -->
<div class="card hidden" id="otpScreen">
<h3>Verifica tu código</h3>
<input id="code" placeholder="8 dígitos">
<button onclick="verificarCodigo()">Verificar</button>
</div>

<!-- PERFIL -->
<div class="card hidden" id="profileScreen">
<h3>Completa tu perfil</h3>

<input id="name" placeholder="Nombre completo">
<input id="dni" placeholder="DNI">

<select id="role">
<option value="owner">Dueño</option>
<option value="walker">Paseador</option>
</select>

<input id="password" type="password" placeholder="Contraseña">

<button onclick="crearCuenta()">Crear cuenta</button>
</div>

<!-- HOME -->
<div class="card hidden" id="homeScreen">
<h3>Bienvenido</h3>
<p id="userEmail"></p>
<p>Créditos:</p>
<h1 id="credits">0</h1>
</div>

</div>

<script>
const SUPABASE_URL = "https://dnxiaronekfbbwqzslon.supabase.co"
const SUPABASE_KEY = "sb_publishable_RLJMKIluzhQ-QaU8qLJv-Q_-mkellb0"

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let userEmail = ""

async function enviarCodigo(){
  const email = document.getElementById("email").value
  userEmail = email

  await fetch(`${SUPABASE_URL}/functions/v1/send-otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({email})
  })

  document.getElementById("emailScreen").classList.add("hidden")
  document.getElementById("otpScreen").classList.remove("hidden")
}

async function verificarCodigo(){
  const code = document.getElementById("code").value

  const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-otp`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      email:userEmail,
      code:code
    })
  })

  const data = await res.json()

  if(!data.success){
    alert(data.error)
    return
  }

  document.getElementById("otpScreen").classList.add("hidden")
  document.getElementById("profileScreen").classList.remove("hidden")
}

async function crearCuenta(){

  const name = document.getElementById("name").value
  const dni = document.getElementById("dni").value
  const role = document.getElementById("role").value
  const password = document.getElementById("password").value

  // crear usuario auth
  const { data, error } = await supabase.auth.signUp({
    email:userEmail,
    password
  })

  if(error){
    alert(error.message)
    return
  }

  const user = data.user

  // guardar perfil
  await supabase.from("users").insert({
    id:user.id,
    name,
    email:userEmail,
    dni,
    role
  })

  // crear wallet si es walker
  if(role === "walker"){
    await supabase.from("provider_wallets").insert({
      user_id:user.id,
      provider_type:"walker",
      balance:0
    })
  }

  await cargarHome(user)
}

async function cargarHome(user){

  document.getElementById("profileScreen").classList.add("hidden")
  document.getElementById("homeScreen").classList.remove("hidden")

  document.getElementById("userEmail").innerText = user.email

  const { data } = await supabase
    .from("provider_wallet_balances")
    .select("balance")
    .eq("user_id", user.id)
    .single()

  if(data){
    document.getElementById("credits").innerText = data.balance
  }
}
</script>

</body>
</html>
